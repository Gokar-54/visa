<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>منصة فيديو</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0f172a;
  color: white;
}

header {
  background: #1e293b;
  padding: 15px;
  text-align: center;
  font-size: 22px;
}

.container {
  padding: 20px;
}

.upload-box {
  background: #1e293b;
  padding: 20px;
  border-radius: 10px;
  margin-bottom: 20px;
}

input, button {
  padding: 10px;
  margin-top: 10px;
  width: 100%;
}

button {
  background: #3b82f6;
  border: none;
  color: white;
  cursor: pointer;
}

.video-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
  gap: 15px;
}

.card {
  background: #1e293b;
  border-radius: 10px;
  overflow: hidden;
}

video {
  width: 100%;
}

.card-content {
  padding: 10px;
}

.like {
  cursor: pointer;
  color: #f87171;
}

.admin-btn {
  background: #10b981;
}

.delete-btn {
  background: red;
  margin-top: 5px;
}

footer {
  text-align: center;
  padding: 20px;
  background: #1e293b;
  margin-top: 30px;
}
</style>
</head>

<body>

<header>🎬 منصة فيديو</header>

<div class="container">

  <button onclick="loginAdmin()" class="admin-btn">دخول الأدمن</button>

  <div id="adminPanel" style="display:none;">
    <div class="upload-box">
      <h3>رفع فيديو</h3>
      <input type="text" id="title" placeholder="عنوان الفيديو">
      <input type="file" id="videoFile" accept="video/*">
      <button onclick="uploadVideo()">رفع الفيديو</button>
    </div>
  </div>

  <div class="video-grid" id="videos"></div>

</div>

<footer>
📩 للتواصل:  
<a href="mailto:gaethg20@gmail.com" style="color:#3b82f6;">gaethg20@gmail.com</a>
</footer>

<script>
let videos = JSON.parse(localStorage.getItem("videos")) || [];
let isAdmin = false;

// غير كلمة السر
const ADMIN_PASSWORD = "1234";

// 🔥 حط معلوماتك هون
const CLOUD_NAME = "YOUR_CLOUD_NAME";
const UPLOAD_PRESET = "YOUR_UPLOAD_PRESET";

function save() {
  localStorage.setItem("videos", JSON.stringify(videos));
}

function loginAdmin() {
  const pass = prompt("أدخل كلمة السر:");
  if (pass === ADMIN_PASSWORD) {
    isAdmin = true;
    document.getElementById("adminPanel").style.display = "block";
    alert("تم تسجيل الدخول");
  } else {
    alert("كلمة السر غلط");
  }
}

// ✅ رفع احترافي
async function uploadVideo() {
  const title = document.getElementById("title").value;
  const file = document.getElementById("videoFile").files[0];

  if (!file) return alert("اختر فيديو");

  let formData = new FormData();
  formData.append("file", file);
  formData.append("upload_preset", UPLOAD_PRESET);

  try {
    let res = await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/video/upload`, {
      method: "POST",
      body: formData
    });

    let data = await res.json();

    if (data.secure_url) {
      videos.push({
        title,
        url: data.secure_url,
        likes: 0
      });

      save();
      renderVideos();
      alert("تم رفع الفيديو بنجاح 🔥");
    } else {
      alert("صار خطأ بالرفع");
      console.log(data);
    }

  } catch (err) {
    alert("فشل الاتصال");
    console.log(err);
  }
}

function likeVideo(i) {
  videos[i].likes++;
  save();
  renderVideos();
}

function deleteVideo(i) {
  if (!isAdmin) return alert("فقط الأدمن");
  videos.splice(i, 1);
  save();
  renderVideos();
}

function renderVideos() {
  const container = document.getElementById("videos");
  container.innerHTML = "";

  videos.forEach((v, i) => {
    container.innerHTML += `
      <div class="card">
        <video controls src="${v.url}"></video>
        <div class="card-content">
          <h4>${v.title}</h4>
          <p class="like" onclick="likeVideo(${i})">❤️ ${v.likes}</p>
          ${isAdmin ? `<button class="delete-btn" onclick="deleteVideo(${i})">حذف</button>` : ""}
        </div>
      </div>
    `;
  });
}

renderVideos();
</script>

</body>
</html>
